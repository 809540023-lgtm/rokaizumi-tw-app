version: "3.9"

# 自架 / VPS 一鍵啟動：MySQL + 應用程式 + Nginx 反向代理 + Certbot HTTPS
#
# 用法：
#   1. 複製 .env.example 為 .env，填入您的設定值
#   2. docker compose up -d
#   3. 第一次：docker compose exec app pnpm db:push
#   4. （選擇性）docker compose exec app node scripts/seed-220-products.mjs

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: rokaizumi-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://rokaizumi:${DB_PASSWORD}@db:3306/rokaizumi
      JWT_SECRET: ${JWT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rokaizumi
    ports:
      - "3000:3000"

  db:
    image: mysql:8.0
    container_name: rokaizumi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rokaizumi
      MYSQL_USER: rokaizumi
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - rokaizumi_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - rokaizumi
    # ports: 預設不對外，從外部不可直接連，安全
    # - "3306:3306"

  nginx:
    image: nginx:alpine
    container_name: rokaizumi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - rokaizumi

  certbot:
    image: certbot/certbot
    container_name: rokaizumi-certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      sh -c 'trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot;
      sleep 12h & wait $${!}; done;'

networks:
  rokaizumi:
    driver: bridge

volumes:
  rokaizumi_db:
