# Nginx 設定（Docker Compose 用）
# 用於：把 80 / 443 流量轉給 app 容器；用 Let's Encrypt 自動 HTTPS

# HTTP → HTTPS 轉址
server {
    listen 80;
    server_name rokaizumi-tw.jp www.rokaizumi-tw.jp;

    # Certbot 驗證
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他全部轉 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 正式服務
server {
    listen 443 ssl http2;
    server_name rokaizumi-tw.jp www.rokaizumi-tw.jp;

    ssl_certificate /etc/letsencrypt/live/rokaizumi-tw.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rokaizumi-tw.jp/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 上傳大小（商品圖片）
    client_max_body_size 25m;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # 反向代理到 Node app
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # 靜態資源加長 cache
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2)$ {
        proxy_pass http://app:3000;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
